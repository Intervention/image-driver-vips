name: Tests

on: [ push, pull_request ]

jobs:
  run:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4', '8.5' ]
        stability: [ prefer-stable ]
        libvips: [ '8.18.1' ]

    name: PHP ${{ matrix.php }} - ${{ matrix.stability }} - vips ${{ matrix.libvips }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install vips ${{ matrix.libvips }} from source
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            python3-pip \
            libglib2.0-dev \
            libexpat1-dev \
            libjpeg-turbo8-dev \
            libpng-dev \
            libtiff-dev \
            libwebp-dev \
            liblcms2-dev \
            libffi-dev \
            libexif-dev \
            libheif-dev \
            libheif-plugin-aomenc \
            libheif-plugin-x265 \
            libcgif-dev \
            libimagequant-dev \
            libopenjp2-7-dev \
            librsvg2-dev \
            libpoppler-glib-dev \
            libfftw3-dev \
            libarchive-dev \
            libhwy-dev \
            libmagickcore-dev \
            libpango1.0-dev \
            libcfitsio-dev \
            libmatio-dev \
            libopenexr-dev
          pip3 install meson --break-system-packages
          curl -fsSL https://github.com/libvips/libvips/releases/download/v${{ matrix.libvips }}/vips-${{ matrix.libvips }}.tar.xz -o /tmp/vips.tar.xz
          tar xf /tmp/vips.tar.xz -C /tmp
          meson setup /tmp/vips-${{ matrix.libvips }}/build /tmp/vips-${{ matrix.libvips }} --libdir=lib --buildtype=release -Dintrospection=disabled
          meson compile -C /tmp/vips-${{ matrix.libvips }}/build
          sudo meson install -C /tmp/vips-${{ matrix.libvips }}/build
          sudo ldconfig

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: zend.max_allowed_stack_size=-1,ffi.enable=true
          extensions: ffi, exif
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ matrix.stability }}-vips-${{ matrix.libvips }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ matrix.stability }}-vips-${{ matrix.libvips }}-

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit --no-coverage

      - name: Run analyzer
        run: vendor/bin/phpstan

      - name: Validate coding standards
        run: vendor/bin/phpcs
